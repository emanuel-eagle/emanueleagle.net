name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: infra
        run: terraform init

      - name: Import existing resources (temporary)
        working-directory: infra
        run: |
          terraform import aws_s3_bucket.site emanueleagle.net || true
          terraform import aws_cloudfront_origin_access_control.site E8I2OKOWEMXSJ || true
          terraform import aws_route53_zone.site Z057999439RPH4BVKB0A8 || true

      - name: Terraform Apply
        working-directory: infra
        run: terraform apply -auto-approve

      - name: Get Terraform outputs
        id: tf
        working-directory: infra
        run: |
          echo "bucket=$(terraform output -raw s3_bucket)" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$(terraform output -raw cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build HTML
        run: python .github/workflows/build.py

      - name: Sync to S3
        run: aws s3 sync html/ s3://${{ steps.tf.outputs.bucket }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.tf.outputs.distribution_id }} \
            --paths "/*"
